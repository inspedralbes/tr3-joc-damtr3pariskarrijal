services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tankstars
    ports:
      - "3306:3306"
    volumes:
      - ./server/api/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  api:
    build: ./server/api
    ports:
      - "3001:3001"
    depends_on:
      - mysql

  game:
    build: ./server/game
    ports:
      - "3002:3002"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api
      - game
